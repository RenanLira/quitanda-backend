# ===================================
# POSTGRESQL CONFIGURATION
# ===================================
# Otimizado para servidor pequeno (1 vCPU / 1GB RAM)
# Perfil conservador para evitar OOM

# ===================================
# CONEXÕES
# ===================================
max_connections = 20                    # Menor consumo de memória por conexão
superuser_reserved_connections = 3      # Conexões reservadas para superusuário

listen_addresses = '*'                     # Permitir conexões externas (ajuste conforme necessário)
# ===================================
# MEMÓRIA
# ===================================
# Memória compartilhada (aprox. 12% da RAM total)
shared_buffers = 128MB                  # Perfil 1GB RAM

# Memória para operações de ordenação/hash por conexão
work_mem = 2MB                          # Evita explosão com muitas conexões

# Memória para manutenção (VACUUM, CREATE INDEX)
maintenance_work_mem = 64MB             # Manutenção com baixo consumo

# Cache efetivo total disponível (50-75% da RAM)
effective_cache_size = 384MB            # Estimativa realista para host pequeno

# Evita tentativas de uso de huge pages indisponíveis em VPS menores
huge_pages = off

# ===================================
# CHECKPOINTS (Write-Ahead Log)
# ===================================
# Intervalo entre checkpoints
checkpoint_completion_target = 0.9      # Distribuir I/O ao longo do tempo

# Tamanho máximo do WAL
max_wal_size = 512MB                    # Reduz uso total de disco e memória
min_wal_size = 128MB

# ===================================
# QUERY PLANNER
# ===================================
# Custo estimado de operações
random_page_cost = 1.1                  # SSD: 1.1, HDD: 4.0
effective_io_concurrency = 50           # Ajuste conservador

# ===================================
# PARALELISMO
# ===================================
max_worker_processes = 2                # 1 vCPU + folga mínima
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_parallel_maintenance_workers = 1

# ===================================
# LOGGING (ajuste conforme necessidade)
# ===================================
# Nível de log
log_min_duration_statement = 1000       # Log queries > 1 segundo (DEV: 500, PROD: 1000)
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Estatísticas
# Desabilitado para reduzir memória em ambiente pequeno.
# Habilite somente se precisar de profiling detalhado.
# shared_preload_libraries = 'pg_stat_statements'
# pg_stat_statements.track = all

# ===================================
# AUTOVACUUM (Manutenção Automática)
# ===================================
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 30s                # DEV: 60s, PROD: 30s

# ===================================
# CLIENTE
# ===================================
timezone = 'America/Sao_Paulo'
lc_messages = 'pt_BR.UTF-8'
lc_monetary = 'pt_BR.UTF-8'
lc_numeric = 'pt_BR.UTF-8'
lc_time = 'pt_BR.UTF-8'
default_text_search_config = 'pg_catalog.portuguese'

# ===================================
# NOTAS
# ===================================
# Depois de alterar este arquivo:
# 1. Reinicie o container: docker-compose restart postgres
# 2. Ou recarregue configs: docker exec postgres_db pg_ctl reload