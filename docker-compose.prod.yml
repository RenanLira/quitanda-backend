services:
  cert_init:
    image: alpine:3.21
    container_name: cert_init_prod
    restart: "no"
    command: >
      sh -c "apk add --no-cache openssl >/dev/null &&
      mkdir -p /etc/letsencrypt/live/quitanda &&
      if [ ! -f /etc/letsencrypt/live/quitanda/fullchain.pem ] || [ ! -f /etc/letsencrypt/live/quitanda/privkey.pem ]; then
      openssl req -x509 -nodes -newkey rsa:2048 -days 1
      -keyout /etc/letsencrypt/live/quitanda/privkey.pem
      -out /etc/letsencrypt/live/quitanda/fullchain.pem
      -subj '/CN=localhost';
      fi"
    volumes:
      - certbot_conf:/etc/letsencrypt

    mem_limit: 64m
    cpus: 0.10

    networks:
      - frontend_network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_prod
    restart: always

    depends_on:
      cert_init:
        condition: service_completed_successfully
      api:
        condition: service_healthy

    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"

    command: >
      /bin/sh -c "(while :; do sleep 6h; nginx -s reload; done) &
      nginx -g 'daemon off;'"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    mem_limit: 64m
    cpus: 0.07

    deploy:
      resources:
        limits:
          cpus: '0.07'
          memory: 64M
        reservations:
          cpus: '0.03'
          memory: 32M

    networks:
      - frontend_network
      - backend_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    container_name: certbot_prod
    restart: unless-stopped

    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-example.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@example.com}

    command: >
      sh -c "trap exit TERM;
      while :; do
      certbot certonly --webroot -w /var/www/certbot
      --cert-name quitanda
      --agree-tos --non-interactive
      --email $$LETSENCRYPT_EMAIL
      -d $$DOMAIN_NAME
      --keep-until-expiring || true;
      certbot renew --webroot -w /var/www/certbot --quiet || true;
      sleep 12h;
      done"

    depends_on:
      nginx:
        condition: service_started

    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

    mem_limit: 128m
    cpus: 0.08

    networks:
      - frontend_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: quitanda-backend:prod
    container_name: quitanda_api_prod
    restart: always

    env_file:
      - .env

    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      POSTGRES_PORT: 5432

    expose:
      - "8000"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    mem_limit: 288m
    cpus: 0.40

    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 288M
        reservations:
          cpus: '0.15'
          memory: 128M

    networks:
      - backend_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: postgres_prod
    restart: always  # Sempre reiniciar em produção
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password  # Usar secrets
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    
    # NÃO expor porta externamente em produção
    # Use network interno ou tunnel SSH
    expose:
      - "5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./backups:/backups  # Diretório para backups
    
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
    networks:
      - backend_network
    
    # Limites de recursos em produção
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 448M
        reservations:
          cpus: '0.20'
          memory: 224M

    mem_limit: 448m
    cpus: 0.45
    
    # Usar secrets do Docker Swarm
    secrets:
      - postgres_password
    
    # Política de logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backup automático (ESSENCIAL EM PRODUÇÃO)
  postgres_backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: postgres_backup
    restart: always
    
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"  # Backup diário às 00:00
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    
    volumes:
      - ./backups:/backups
    
    networks:
      - backend_network
    
    depends_on:
      postgres:
        condition: service_healthy

    mem_limit: 128m
    cpus: 0.08

volumes:
  postgres_data:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
    internal: true  # Rede interna, sem acesso externo direto

# Secrets para produção (Docker Swarm)
secrets:
  postgres_password:
    external: true