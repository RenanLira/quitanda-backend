services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_prod
    restart: always

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "${NGINX_HTTP_PORT:-80}:80"

    command: nginx -g 'daemon off;'

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    mem_limit: 64m
    cpus: 0.07

    deploy:
      resources:
        limits:
          cpus: '0.07'
          memory: 64M
        reservations:
          cpus: '0.03'
          memory: 32M

    networks:
      - frontend_network
      - backend_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quitanda_api_prod
    restart: always

    env_file:
      - .env

    expose:
      - "8000"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    mem_limit: 288m
    cpus: 0.40

    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 288M
        reservations:
          cpus: '0.15'
          memory: 128M

    networks:
      - backend_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: postgres_prod
    restart: always  # Sempre reiniciar em produção
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    
    # NÃO expor porta externamente em produção
    # Use network interno ou tunnel SSH
    expose:
      - "5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./backups:/backups  # Diretório para backups
    
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
    networks:
      - backend_network
    
    # Limites de recursos em produção
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 448M
        reservations:
          cpus: '0.20'
          memory: 224M

    mem_limit: 448m
    cpus: 0.45
    
    
    # Política de logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backup automático (ESSENCIAL EM PRODUÇÃO)
  postgres_backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: postgres_backup
    restart: always
    
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"  # Backup diário às 00:00
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    
    volumes:
      - ./backups:/backups
    
    networks:
      - backend_network
    
    depends_on:
      postgres:
        condition: service_healthy

    mem_limit: 128m
    cpus: 0.08

volumes:
  postgres_data:
    driver: local

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
    internal: true  # Rede interna, sem acesso externo direto

